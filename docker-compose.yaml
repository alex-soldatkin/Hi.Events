version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.all-in-one
    container_name: hi-events-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8264}:80" # Maps host port 8000 to container port 80
    environment:
      APP_KEY: ${APP_KEY}
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}
      JWT_SECRET: ${JWT_SECRET}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      MAIL_MAILER: ${MAIL_MAILER}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: "${MAIL_FROM_NAME}"
      FILESYSTEM_PUBLIC_DISK: ${FILESYSTEM_PUBLIC_DISK}
      FILESYSTEM_PRIVATE_DISK: ${FILESYSTEM_PRIVATE_DISK}
      APP_CDN_URL: ${APP_CDN_URL}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    depends_on:
      - db
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./storage:/app/backend/storage
      - ./bootstrap/cache:/app/backend/bootstrap/cache
    networks:
      - hi-events-network

  db:
    image: postgres:14
    container_name: hi-events-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5687:5432"
    networks:
      - hi-events-network

networks:
  hi-events-network:
    driver: bridge

volumes:
  db_data:
